services:
  db:
    image: postgres:15
    container_name: newsletter_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: newsletter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: newsletter_backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/newsletter

  frontend:
    build: ./frontend
    container_name: newsletter_frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  postgres_data: